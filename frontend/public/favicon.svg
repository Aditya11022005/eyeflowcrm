<svg xmlns="http://www.w3.org/2000/svg" viewBox="160 50 180 180" width="100%" height="100%">
  <defs>
    <!-- Top crescent: Cyan/Blue gradient -->
    <linearGradient id="blueArch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="40%" stop-color="#0066eb"/>
      <stop offset="100%" stop-color="#003594"/>
    </linearGradient>
    
    <!-- Bottom crescent: Deep purple/violet gradient -->
    <linearGradient id="purpleArch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="50%" stop-color="#5a189a"/>
      <stop offset="100%" stop-color="#240046"/>
    </linearGradient>

    <!-- Iris gradient -->
    <linearGradient id="irisGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2CBF"/>
      <stop offset="100%" stop-color="#0052D4"/>
    </linearGradient>

    <!-- Pupil gradient -->
    <linearGradient id="pupilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <g transform="translate(150, 40)">
    <!-- Bottom Purple/Violet Arch -->
    <path d="M 20 100 C 40 160, 160 165, 175 125 C 160 180, 50 185, 20 100 Z" fill="url(#purpleArch)" />
    
    <!-- Top Blue Arch -->
    <path d="M 20 100 C 40 40, 160 35, 175 75 C 160 20, 50 15, 20 100 Z" fill="url(#blueArch)" />
    
    <!-- Iris (Blue outer ring) -->
    <circle cx="100" cy="100" r="48" fill="url(#irisGrad)" opacity="0.95" />
    
    <!-- Pupil (Dark core) -->
    <circle cx="100" cy="100" r="32" fill="url(#pupilGrad)" />
    
    <!-- Pupil reflection highlights -->
    <circle cx="112" cy="88" r="9" fill="#ffffff" />
    <circle cx="88" cy="112" r="4" fill="#ffffff" opacity="0.6" />
  </g>
</svg>